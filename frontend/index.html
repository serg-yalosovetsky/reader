<!DOCTYPE html>
<html lang="ru" data-theme="day">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Читалка</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="stylesheet" href="/css/theme.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400;1,700&family=Merriweather:ital,wght@0,400;0,700;1,400;1,700&family=Nunito:ital,wght@0,400;0,700;1,400;1,700&family=Open+Sans:ital,wght@0,400;0,700;1,400;1,700&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=PT+Sans:ital,wght@0,400;0,700;1,400;1,700&display=swap" />
</head>
<body>
  <!-- ======================= БИБЛИОТЕКА ======================= -->
  <section id="library" class="screen">
    <header class="lib-header">
      <h1 class="lib-title">Моя библиотека</h1>
      <div class="lib-actions">
        <form id="ingest-form" class="ingest" autocomplete="off">
          <input id="ingest-input" type="text" placeholder="Ссылка или название фанфика…" />
          <button type="submit" class="btn-primary" title="Скачать и открыть">Добавить</button>
        </form>
        <label class="btn-ghost" for="upload-input">Загрузить файл</label>
        <input id="upload-input" type="file" accept=".epub,.fb2,.pdf" hidden />
        <button id="readera-sync" class="btn-ghost" title="Синхронизировать прогресс с ReadEra">⇄ ReadEra</button>
        <button id="check-updates-main" class="btn-ghost" title="Проверить обновления подписок">↻ Обновления</button>
        <button id="accounts-btn" class="btn-ghost" title="Аккаунты и обновления">Аккаунты</button>
      </div>
    </header>
    <div id="ingest-status" class="ingest-status" hidden></div>
    <div class="lib-filter-bar"><input id="lib-filter" type="search" placeholder="Фильтр по названию, автору…" autocomplete="off" /></div>
    <div id="book-grid" class="book-grid"></div>
    <p id="lib-empty" class="lib-empty" hidden>Пока пусто. Вставьте ссылку на фанфик или загрузите файл.</p>

    <!-- Модал аккаунтов и обновлений -->
    <div id="accounts-overlay" class="modal-overlay" hidden>
      <div class="modal">
        <div class="modal-head">
          <span>Аккаунты и обновления</span>
          <button id="accounts-close" class="icon-btn">✕</button>
        </div>

        <div class="modal-section">
          <div class="setting-label">Аккаунты сайтов (пароль хранится зашифрованным)</div>
          <div id="accounts-list" class="accounts-list"></div>
          <form id="account-form" class="account-form" autocomplete="off">
            <select id="acc-site" class="select">
              <option value="ficbook">ficbook.net</option>
              <option value="fanfics">fanfics.me</option>
              <option value="authortoday">author.today</option>
              <option value="ao3">AO3</option>
              <option value="ffn">fanfiction.net</option>
            </select>
            <input id="acc-user" type="text" placeholder="логин" />
            <input id="acc-pass" type="password" placeholder="пароль" />
            <button type="submit" class="btn-primary">Сохранить</button>
          </form>
        </div>

        <div class="modal-section">
          <div class="modal-row">
            <span class="setting-label">Отслеживаемые фанфики</span>
            <button id="check-updates" class="btn-ghost">Проверить обновления</button>
          </div>
          <div id="monitored-list" class="monitored-list"></div>
        </div>
        <div id="accounts-status" class="ingest-status" hidden></div>
      </div>
    </div>
  </section>

  <!-- ======================= ЧИТАЛКА ======================= -->
  <section id="reader" class="screen" hidden>
    <div id="reader-top" class="reader-bar reader-top">
      <button id="back-btn" class="icon-btn" title="К библиотеке">‹ Библиотека</button>
      <span id="reader-title" class="reader-title"></span>
      <div class="reader-top-actions">
        <button id="tts-btn" class="icon-btn" title="Читать вслух">🔊</button>
        <button id="search-btn" class="icon-btn" title="Поиск по книге">🔍</button>
        <button id="toc-btn" class="icon-btn" title="Оглавление">☰</button>
        <button id="settings-btn" class="icon-btn" title="Вид">Aa</button>
      </div>
    </div>

    <div id="view-host" class="view-host">
      <div id="tap-prev" class="tap-zone tap-prev" title="Назад"></div>
      <div id="tap-next" class="tap-zone tap-next" title="Вперёд"></div>
    </div>

    <!-- TTS -->
    <div id="tts-bar" class="tts-bar" hidden>
      <button id="tts-stop" class="icon-btn" title="Стоп">■</button>
      <button id="tts-play" class="icon-btn" title="Пауза / Продолжить">⏸</button>
      <span id="tts-info" class="tts-info"></span>
      <select id="tts-rate" class="select tts-rate-sel">
        <option value="0.75">0.75×</option>
        <option value="1" selected>1×</option>
        <option value="1.25">1.25×</option>
        <option value="1.5">1.5×</option>
        <option value="2">2×</option>
      </select>
      <select id="tts-voice" class="select tts-voice-sel"></select>
    </div>

    <div id="reader-bottom" class="reader-bar reader-bottom">
      <button id="prev-btn" class="icon-btn" title="Назад">‹</button>
      <input id="progress-slider" class="progress-slider" type="range" min="0" max="1" step="0.0001" value="0" />
      <span id="progress-label" class="progress-label">0%</span>
      <button id="next-btn" class="icon-btn" title="Вперёд">›</button>
    </div>

    <!-- Панель поиска по книге -->
    <aside id="search-panel" class="panel" hidden>
      <div class="panel-head">Поиск по книге</div>
      <form id="search-form" class="search-form" autocomplete="off">
        <input id="search-input" type="search" placeholder="Найти в книге…" />
      </form>
      <div id="search-meta" class="search-meta"></div>
      <nav id="search-results" class="search-results"></nav>
    </aside>

    <!-- Панель оглавления -->
    <aside id="toc-panel" class="panel" hidden>
      <div class="panel-head">Оглавление</div>
      <nav id="toc-list" class="toc-list"></nav>
    </aside>

    <!-- Панель вида (темы, шрифт) -->
    <aside id="settings-panel" class="panel" hidden>
      <div class="panel-head">Вид</div>
      <div class="setting-row">
        <span class="setting-label">Тема</span>
        <div class="theme-swatches">
          <button class="swatch" data-theme="day" title="День" style="background:#ffffff;color:#222"></button>
          <button class="swatch" data-theme="sepia" title="Сепия" style="background:#f5ecd9;color:#5b4636"></button>
          <button class="swatch" data-theme="grey"     title="Серая"    style="background:#cfd2d4;color:#222"></button>
          <button class="swatch" data-theme="dusk"     title="Сумерки"  style="background:#2b2e33;color:#dde1e7"></button>
          <button class="swatch" data-theme="night"    title="Ночь"     style="background:#15171a;color:#cbd0d6"></button>
          <button class="swatch" data-theme="terminal" title="Терминал" style="background:#0d1117;color:#3fb950">●</button>
          <button class="swatch" data-theme="black"    title="Чёрная"   style="background:#000;color:#bdbdbd"></button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Размер</span>
        <div class="stepper">
          <button id="font-dec" class="icon-btn">A−</button>
          <span id="font-val" class="stepper-val">100%</span>
          <button id="font-inc" class="icon-btn">A+</button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Поля</span>
        <div class="stepper">
          <button id="margin-dec" class="icon-btn">−</button>
          <span id="margin-val" class="stepper-val">сред.</span>
          <button id="margin-inc" class="icon-btn">+</button>
        </div>
      </div>
      <div class="setting-row">
        <span class="setting-label">Шрифт</span>
        <select id="font-family" class="select">
          <optgroup label="С засечками">
            <option value="merriweather">Merriweather</option>
            <option value="lora">Lora</option>
            <option value="pt-serif">PT Serif</option>
            <option value="georgia">Georgia</option>
          </optgroup>
          <optgroup label="Без засечек">
            <option value="open-sans">Open Sans</option>
            <option value="nunito">Nunito</option>
            <option value="pt-sans">PT Sans</option>
          </optgroup>
        </select>
      </div>
      <div class="setting-row">
        <span class="setting-label">Режим</span>
        <select id="flow-mode" class="select">
          <option value="paginated">Страницы</option>
          <option value="scrolled">Лента</option>
        </select>
      </div>
      <div class="setting-row" id="columns-row">
        <span class="setting-label">Колонки</span>
        <select id="columns-mode" class="select">
          <option value="1">Одна</option>
          <option value="2">Две</option>
        </select>
      </div>
    </aside>
    <div id="panel-overlay" class="panel-overlay" hidden></div>
  </section>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
