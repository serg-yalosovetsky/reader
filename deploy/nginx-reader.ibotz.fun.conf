# nginx-сайт читалки: HTTPS + vps-sso (паттерн как у monoflow.ibotz.fun).
# Кладётся в /etc/nginx/sites-available/reader.ibotz.fun и симлинкуется в sites-enabled.
# Сертификат выдаёт certbot: certbot certonly --nginx -d reader.ibotz.fun
# Бэкенд читалки слушает 127.0.0.1:8123 (см. reader.service).

server {
    server_name reader.ibotz.fun;
    http2 on;

    # ---- vps-sso auth_request (internal only) ----
    location = /sso-auth {
        internal;
        proxy_pass http://[::1]:3010/api/auth/check;
        # Clerk отдаёт 307 на browser-like запросы — auth_request такое не умеет,
        # поэтому исходные заголовки браузера не пробрасываем.
        proxy_pass_request_headers off;
        proxy_set_header Host              sso.ibotz.fun;
        proxy_set_header X-Original-URI    $request_uri;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header Cookie            $http_cookie;
        proxy_set_header Accept            "application/json";
        proxy_set_header User-Agent        "nginx-auth-subrequest";
        proxy_set_header X-Internal-Secret 6bbc3fab53fbd2d98877259a1e4411dc751750de2233c38d5457569ee914ba5b;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    # ---- всё за SSO ----
    location / {
        auth_request /sso-auth;
        auth_request_set $sso_email $upstream_http_x_auth_email;
        auth_request_set $sso_user  $upstream_http_x_auth_user;

        error_page 401 403 = @sso_redirect;

        proxy_pass http://127.0.0.1:8123;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Email $sso_email;
        proxy_set_header X-Forwarded-User  $sso_email;
        proxy_set_header Remote-User       $sso_email;
    }

    location @sso_redirect {
        return 302 https://sso.ibotz.fun/sign-in?redirect_url=$scheme://$host$request_uri;
    }

    client_max_body_size 1000M;
    access_log /var/log/nginx/reader.access.log;
    error_log  /var/log/nginx/reader.error.log;

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/reader.ibotz.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reader.ibotz.fun/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# ---- HTTP -> HTTPS ----
server {
    if ($host = reader.ibotz.fun) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name reader.ibotz.fun;
    return 404;
}
